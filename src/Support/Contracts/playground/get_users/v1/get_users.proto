syntax = "proto3";

package get_users.v1;

option php_namespace = "App\\Support\\Contracts\\Playground\\GRPC";
option php_metadata_namespace = "App\\Support\\Contracts\\Playground\\GRPC\\GPBMetadata";

// Request message for retrieving users.
// If `usn` is empty, all users will be returned.
message GetUsersRequest {
  string usn = 1; // optional filter by USN (leave empty to disable filtering)
}

// Value object representing a user's name.
message Username {
  string first_name = 1;
  string last_name = 2;
}

// A basic representation of a user in the system.
message User {
  string id = 1;
  string email = 2;
  Username username = 3; // value object encapsulating first and last name
  string usn = 5;
}

// Response containing a list of users.
message GetUsersResponse {
  repeated User users = 1;
}

// Internal gRPC service for user-related operations.
service GetUsersGrpcService {
  // Returns a list of users filtered by an optional USN number.
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
}
